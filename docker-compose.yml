services:
  postgres:
    image: postgres:15-alpine
    container_name: scooby-postgres
    environment:
      POSTGRES_USER: scooby
      POSTGRES_PASSWORD: scooby_dev
      POSTGRES_DB: scooby
    ports:
      - "5433:5432"
    volumes:
      - scooby_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scooby"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scooby-redis
    ports:
      - "6380:6379"
    volumes:
      - scooby_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  scooby_pgdata:
  scooby_redisdata:
